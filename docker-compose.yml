version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=korumlab123
    env_file:
      - .env
    depends_on:
      - neo4j
    volumes:
      - .:/app
    command: uvicorn api:app --host 0.0.0.0 --port 8080 --reload

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474" # Browser UI
      - "7687:7687" # Python driver connection
    environment:
      - NEO4J_AUTH=neo4j/korumlab123
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
